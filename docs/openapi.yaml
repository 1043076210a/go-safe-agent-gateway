openapi: 3.0.3
info:
  title: Go Safe Agent Gateway
  version: 0.1.0
  description: Safe tool-execution gateway for LLM agents.
servers:
  - url: http://127.0.0.1:8080
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /v1/tools:
    get:
      summary: List registered tools
      responses:
        "200":
          description: Tool metadata list
  /v1/tools/execute:
    post:
      summary: Execute a registered tool through policy and executor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteToolRequest"
      responses:
        "200":
          description: Tool execution result or async task
        "400":
          description: Validation or policy error
  /v1/agent/chat:
    post:
      summary: Generate a tool call using the LLM, execute it safely, and return a final answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Agent response
  /v1/documents:
    post:
      summary: Index a document into Qdrant-backed knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexDocumentRequest"
      responses:
        "200":
          description: Indexed document summary
  /v1/sessions:
    post:
      summary: Create an agent session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                title:
                  type: string
      responses:
        "200":
          description: Created session
  /v1/sessions/{id}/messages:
    get:
      summary: List messages in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Message list
  /v1/async-tasks/{id}:
    get:
      summary: Get async task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Async task state
        "404":
          description: Task not found
  /v1/audit/tool-calls:
    get:
      summary: List tool call audit records
      responses:
        "200":
          description: Audit records
  /v1/audit/policy-rejects:
    get:
      summary: List policy rejection records
      responses:
        "200":
          description: Policy rejection records
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ExecuteToolRequest:
      type: object
      required:
        - user_id
        - tool_name
      properties:
        user_id:
          type: string
        session_id:
          type: string
        message_id:
          type: string
        tool_name:
          type: string
          example: search_knowledge_base
        async:
          type: boolean
          default: false
        input:
          type: object
          additionalProperties: true
    ChatRequest:
      type: object
      required:
        - user_id
        - message
      properties:
        user_id:
          type: string
        session_id:
          type: string
        message:
          type: string
    IndexDocumentRequest:
      type: object
      required:
        - content
      properties:
        title:
          type: string
        source_type:
          type: string
          default: manual
        source_path:
          type: string
        content:
          type: string
