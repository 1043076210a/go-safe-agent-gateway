name: go-safe-agent-gateway-prod

services:
  app:
    image: ${APP_IMAGE:-go-safe-agent-gateway-app:latest}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: prod
      GIN_MODE: release
      HTTP_ADDR: :8080
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:?GATEWAY_API_KEY is required}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-1048576}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:?CORS_ALLOW_ORIGINS is required}
      MYSQL_DSN: ${MYSQL_USER:-go_agent}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}@tcp(mysql:3306)/${MYSQL_DATABASE:-go_agent}?parseTime=true
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-agent_documents}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-64}
      RAG_SCORE_THRESHOLD: ${RAG_SCORE_THRESHOLD:-0.10}
      ENABLE_MOCK_LLM: ${ENABLE_MOCK_LLM:-false}
      ENABLE_MOCK_EMBEDDING: ${ENABLE_MOCK_EMBEDDING:-true}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY is required}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      RATE_LIMIT_FAIL_CLOSED: ${RATE_LIMIT_FAIL_CLOSED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      TOOL_DEFAULT_TIMEOUT_MS: ${TOOL_DEFAULT_TIMEOUT_MS:-5000}
      MAX_SQL_ROWS: ${MAX_SQL_ROWS:-100}
      URL_ALLOWLIST: ${URL_ALLOWLIST:-example.com,httpbin.org,api.github.com}
      ASYNC_WORKERS: ${ASYNC_WORKERS:-2}
      ASYNC_QUEUE_SIZE: ${ASYNC_QUEUE_SIZE:-32}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-go_agent}
      MYSQL_USER: ${MYSQL_USER:-go_agent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-go_agent}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      app:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  caddy_data:
  caddy_config:
